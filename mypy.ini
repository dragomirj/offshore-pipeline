[mypy]
python_version = 3.12
strict = True
ignore_missing_imports = True
exclude = ^tests/

# sensor_event_pb2 is auto-generated by protoc. The protobuf runtime resolves
# Message to Any, producing misc and type-arg errors throughout the stub.
# These are expected and not actionable — suppress at the module level.
[mypy-src.common.serialization.serializers.protobuf.proto.sensor_event_pb2]
ignore_errors = True
